<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AURA // Web Design Creator</title>
  <meta name="description" content="A premium visual web design creator with a live iframe preview, industry color matrices, and production export tools.">
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
  <div class="page-shell">
    <div class="bg-orb orb-a"></div>
    <div class="bg-orb orb-b"></div>

    <header class="topbar">
      <div class="brand-lockup">
        <div class="brand-mark">▲</div>
        <div>
          <div class="brand-name">AURA.SYSTEM</div>
          <div class="brand-subtitle">Web Design Creator</div>
        </div>
      </div>
      <div class="topbar-actions">
        <button class="chip-button" id="clear-canvas-btn" type="button">Clear Layout</button>
        <button class="chip-button" id="toggle-code-drawer" type="button">View Code</button>
        <button class="primary-button" id="download-zip-btn" type="button">Download Production ZIP</button>
      </div>
    </header>

    <main class="builder">
      <aside class="panel panel-left">
        <section class="panel-section">
          <div class="section-heading">Control Core</div>
          <label class="field">
            <span>Business Name</span>
            <input id="business-name" type="text" placeholder="Northstar Studio" />
          </label>
          <label class="field">
            <span>Contact Email</span>
            <input id="contact-email" type="email" placeholder="hello@northstar.studio" />
          </label>
          <label class="field">
            <span>Industry Matrix</span>
            <select id="industry-select">
              <option value="saas">SaaS / Product</option>
              <option value="creative">Creative Agency</option>
              <option value="construction">Construction</option>
              <option value="medical">Medical / Dental</option>
              <option value="legal">Legal Practice</option>
              <option value="fitness">Fitness / Performance</option>
            </select>
          </label>
        </section>

        <section class="panel-section">
          <div class="section-heading">Component Library</div>
          <div id="component-library" class="component-library"></div>
        </section>
      </aside>

      <section class="stage">
        <div class="viewport-shell">
          <div class="viewport-toolbar">
            <div class="viewport-label">Live Site Viewer</div>
            <div class="device-switcher">
              <button class="device-btn active" data-device="desktop" type="button">Desktop</button>
              <button class="device-btn" data-device="tablet" type="button">Tablet</button>
              <button class="device-btn" data-device="mobile" type="button">Mobile</button>
            </div>
          </div>
          <div class="viewport-frame desktop" id="viewport-frame">
            <div class="empty-state" id="empty-state">
              <div class="empty-state-title">Build a live site preview</div>
              <div class="empty-state-copy">Add sections from the library and the iframe will render a fully styled client site here.</div>
            </div>
            <iframe id="preview-iframe" title="Live visual preview"></iframe>
          </div>
        </div>
      </section>

      <aside class="panel panel-right">
        <section class="panel-section">
          <div class="section-heading">Active Layout</div>
          <div id="layout-list" class="layout-list"></div>
        </section>
      </aside>
    </main>

    <section class="code-drawer" id="code-drawer" aria-hidden="true">
      <div class="code-header">
        <div class="code-tabs">
          <button class="code-tab active" data-target="html" type="button">HTML</button>
          <button class="code-tab" data-target="css" type="button">CSS</button>
        </div>
        <button class="copy-button" id="copy-code-btn" type="button">Copy to Clipboard</button>
      </div>
      <pre class="code-view active" id="code-html"></pre>
      <pre class="code-view" id="code-css"></pre>
    </section>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
